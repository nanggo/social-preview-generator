name: Publish to NPM

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.1.0, v1.0.0

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run build
        run: pnpm run build

      - name: Run tests
        run: pnpm test
        env:
          SKIP_NETWORK_TESTS: 'true'

      - name: Publish to npm
        run: |
          # Ensure token-based auth isn't used; Trusted Publishing uses OIDC instead.
          unset NODE_AUTH_TOKEN || true
          unset NPM_CONFIG_USERCONFIG || true
          # Use npm publish for --provenance (OIDC attestation), which pnpm does not support
          npm publish --access public --provenance
